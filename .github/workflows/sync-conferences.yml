name: Sync conferences CSV

on:
  push:
    branches: [main, master]
    paths:
      - "index.html"

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate conferences.csv from index.html
        run: python scripts/sync_conferences.py

      - name: Commit updated CSV if changed
        run: |
          git diff --quiet assets/documents/conferences.csv && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/documents/conferences.csv
          git commit -m "chore: sync conferences.csv from index.html"
          git push
